{% extends 'base.html' %}
{% block title %}Inscription — Ymmo{% endblock %}

{% block content %}
<div style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:40px 5%;background:linear-gradient(135deg,var(--light-gray) 0%,var(--cream) 100%)">
    <div style="width:100%;max-width:500px">
        <div style="text-align:center;margin-bottom:40px">
            <a href="{{ url_for('main.index') }}" style="font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:600;color:var(--noir);text-decoration:none">
                YM<span style="color:var(--gold)">M</span>O
            </a>
            <h2 style="margin-top:16px;font-size:1.5rem">Créer votre compte</h2>
            <p class="text-muted" style="margin-top:8px">Rejoignez la plateforme immobilière de référence.</p>
        </div>

        <div class="card" style="padding:36px">
            <form method="POST">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                    <div class="form-group">
                        <label class="form-label">Prénom</label>
                        <input type="text" name="first_name" class="form-control" required placeholder="Jean" autofocus>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Nom</label>
                        <input type="text" name="last_name" class="form-control" required placeholder="Dupont">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Adresse email</label>
                    <input type="email" name="email" class="form-control" required placeholder="jean.dupont@email.fr">
                </div>
                <div class="form-group">
                    <label class="form-label">Téléphone (optionnel)</label>
                    <input type="tel" name="phone" class="form-control" placeholder="06 XX XX XX XX">
                </div>
                <div class="form-group">
                    <label class="form-label">Mot de passe</label>
                    <input type="password" name="password" id="pwd" class="form-control" required placeholder="8 caractères minimum" oninput="checkStrength(this.value)">
                    <div id="strength-bar" style="height:3px;border-radius:2px;margin-top:6px;background:#eee;transition:all 0.3s">
                        <div id="strength-fill" style="height:100%;width:0;border-radius:2px;transition:all 0.3s"></div>
                    </div>
                    <div id="strength-label" style="font-size:0.75rem;color:var(--mid-gray);margin-top:4px"></div>
                </div>
                <div class="form-group">
                    <label class="form-label">Confirmer le mot de passe</label>
                    <input type="password" name="confirm_password" class="form-control" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-gold" style="width:100%;justify-content:center;padding:14px">
                    <i class="fas fa-user-plus"></i> Créer mon compte
                </button>
            </form>

            <div style="text-align:center;margin-top:24px;padding-top:24px;border-top:1px solid var(--light-gray)">
                <p style="font-size:0.875rem;color:var(--mid-gray)">
                    Déjà un compte ?
                    <a href="{{ url_for('auth.login') }}" style="color:var(--gold-dark);font-weight:500">Se connecter</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function checkStrength(v) {
    let score = 0;
    if (v.length >= 8) score++;
    if (/[A-Z]/.test(v)) score++;
    if (/[0-9]/.test(v)) score++;
    if (/[^A-Za-z0-9]/.test(v)) score++;
    const colors = ['#E74C3C','#E67E22','#F1C40F','#2ECC71'];
    const labels = ['Faible','Moyen','Bon','Fort'];
    const widths = ['25%','50%','75%','100%'];
    const fill = document.getElementById('strength-fill');
    const label = document.getElementById('strength-label');
    if (v.length === 0) { fill.style.width='0'; label.textContent=''; return; }
    const i = Math.max(0, score-1);
    fill.style.width = widths[i];
    fill.style.background = colors[i];
    label.textContent = labels[i];
    label.style.color = colors[i];
}
</script>
{% endblock %}
