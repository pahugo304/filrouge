{% extends 'base.html' %}
{% block title %}Connexion — Ymmo{% endblock %}
{% block content %}
<div style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:40px 5%;background:linear-gradient(135deg,var(--light-gray) 0%,var(--cream) 100%)">
    <div style="width:100%;max-width:440px">
        <div style="text-align:center;margin-bottom:40px">
            <a href="{{ url_for('main.index') }}" style="font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:600;color:var(--noir);text-decoration:none">YM<span style="color:var(--gold)">M</span>O</a>
            <h2 style="margin-top:16px;font-size:1.5rem">Connexion</h2>
        </div>
        <div class="card" style="padding:36px">
            <form method="POST">
                <div class="form-group"><label class="form-label">Email</label><input type="email" name="email" class="form-control" required placeholder="votre@email.fr" autofocus></div>
                <div class="form-group"><label class="form-label">Mot de passe</label><input type="password" name="password" class="form-control" required placeholder="••••••••"></div>
                <div class="form-check" style="margin-bottom:24px"><input type="checkbox" name="remember" id="remember"><label for="remember" style="font-size:0.875rem;cursor:pointer;margin-left:8px">Se souvenir de moi</label></div>
                <button type="submit" class="btn btn-gold" style="width:100%;justify-content:center;padding:14px"><i class="fas fa-sign-in-alt"></i> Se connecter</button>
            </form>
            <div style="text-align:center;margin-top:24px;padding-top:24px;border-top:1px solid var(--light-gray)">
                <p style="font-size:0.875rem;color:var(--mid-gray)">Pas de compte ? <a href="{{ url_for('auth.register') }}" style="color:var(--gold-dark);font-weight:500">Créer un compte</a></p>
            </div>
        </div>
        <div style="margin-top:20px;background:rgba(201,168,76,0.08);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px">
            <div style="font-size:0.75rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--gold-dark);margin-bottom:10px;font-weight:600">Comptes démo</div>
            <div style="font-size:0.82rem;color:var(--mid-gray);display:flex;flex-direction:column;gap:6px">
                <span>👤 <strong>Admin :</strong> admin@ymmo.fr / admin123</span>
                <span>🏢 <strong>Agent :</strong> agent@ymmo.fr / agent123</span>
                <span>🙋 <strong>Client :</strong> client@ymmo.fr / client123</span>
            </div>
        </div>
    </div>
</div>
{% endblock %}
